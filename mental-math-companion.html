<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Mental Math Companion</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
/* ── Reset ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow-x: hidden; }

/* ── Tokens ── */
:root {
  --bg:       #1A1A2E;
  --panel:    #16213E;
  --steel:    #0F3460;
  --border:   #1E3050;
  --amber:    #E2B04A;
  --amber-dim:#8B6B2A;
  --white:    #F0F4F8;
  --muted:    #4A6080;
  --green:    #2ECC87;
  --coral:    #E84A5F;
  --yellow:   #F5C842;
  --serif:    'DM Serif Display', serif;
  --sans:     'DM Sans', sans-serif;
  --mono:     'Space Mono', monospace;
}

body {
  background: var(--bg);
  color: var(--white);
  font-family: var(--sans);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
}

/* ── Views ── */
.view { display: none; width: 100%; max-width: 520px; padding: 0 16px 40px; }
.view.active { display: flex; flex-direction: column; }

/* ════════════════════════════════
   MAP VIEW
════════════════════════════════ */
.map-header {
  padding: 28px 0 20px;
  display: flex;
  flex-direction: column;
  gap: 4px;
}
.map-header .eyebrow {
  font-family: var(--mono);
  font-size: 0.6rem;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--amber);
}
.map-header h1 {
  font-family: var(--serif);
  font-size: 1.7rem;
  color: var(--white);
  line-height: 1.1;
}
.map-header .subtitle {
  font-size: 0.8rem;
  color: var(--muted);
  margin-top: 2px;
}

/* Overall progress bar */
.overall-progress {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 14px 16px;
  margin-bottom: 20px;
  display: flex;
  align-items: center;
  gap: 14px;
}
.overall-progress .label {
  font-family: var(--mono);
  font-size: 0.6rem;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--muted);
  white-space: nowrap;
}
.progress-track {
  flex: 1;
  height: 6px;
  background: var(--steel);
  border-radius: 3px;
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--amber), var(--green));
  border-radius: 3px;
  transition: width 0.5s ease;
}
.overall-progress .pct {
  font-family: var(--mono);
  font-size: 0.85rem;
  color: var(--amber);
  font-weight: 700;
  min-width: 36px;
  text-align: right;
}

/* Chapter cards */
.chapter-list { display: flex; flex-direction: column; gap: 10px; }

.chapter-card {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 14px 16px;
  cursor: pointer;
  transition: border-color 0.15s;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
  position: relative;
  overflow: hidden;
}
.chapter-card::before {
  content: '';
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 3px;
  background: var(--border);
  border-radius: 3px 0 0 3px;
  transition: background 0.2s;
}
.chapter-card.mastered::before { background: var(--green); }
.chapter-card.in-progress::before { background: var(--amber); }
.chapter-card.recommended { border-color: var(--amber-dim); }
.chapter-card:active { border-color: var(--amber); }

.chapter-card-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 8px;
}
.chapter-num {
  font-family: var(--mono);
  font-size: 0.6rem;
  letter-spacing: 0.12em;
  color: var(--muted);
  text-transform: uppercase;
}
.chapter-status {
  font-family: var(--mono);
  font-size: 0.6rem;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  padding: 3px 8px;
  border-radius: 20px;
  border: 1px solid var(--border);
  color: var(--muted);
}
.chapter-status.done { border-color: var(--green); color: var(--green); }
.chapter-status.active { border-color: var(--amber); color: var(--amber); }
.chapter-status.next { border-color: var(--amber-dim); color: var(--amber); }

.chapter-title {
  font-family: var(--serif);
  font-size: 1.05rem;
  color: var(--white);
  margin-bottom: 10px;
  line-height: 1.2;
}

/* Technique dots */
.technique-dots {
  display: flex;
  gap: 5px;
  flex-wrap: wrap;
}
.t-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--steel);
  border: 1px solid var(--border);
  transition: background 0.2s;
}
.t-dot.mastered { background: var(--green); border-color: var(--green); }
.t-dot.partial  { background: var(--yellow); border-color: var(--yellow); }
.t-dot.active   { background: var(--amber); border-color: var(--amber); }

.chapter-card-footer {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-top: 10px;
}
.chapter-mastery-pct {
  font-family: var(--mono);
  font-size: 0.75rem;
  color: var(--muted);
}
.chapter-mastery-pct span { color: var(--white); font-weight: 700; }
.chapter-arrow {
  font-size: 0.7rem;
  color: var(--muted);
}

/* Recommended badge */
.recommended-badge {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  font-family: var(--mono);
  font-size: 0.58rem;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--amber);
  margin-bottom: 6px;
}
.recommended-badge::before {
  content: '→';
  font-size: 0.7rem;
}

/* ════════════════════════════════
   CHAPTER VIEW
════════════════════════════════ */
.chapter-header {
  padding: 24px 0 16px;
  display: flex;
  align-items: flex-start;
  gap: 12px;
}
.back-btn {
  background: transparent;
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 8px 12px;
  font-family: var(--sans);
  font-size: 0.75rem;
  color: var(--muted);
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
  white-space: nowrap;
  flex-shrink: 0;
  margin-top: 2px;
}
.back-btn:active { color: var(--white); border-color: var(--muted); }

.chapter-header-text .ch-eyebrow {
  font-family: var(--mono);
  font-size: 0.58rem;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--amber);
  margin-bottom: 3px;
}
.chapter-header-text h2 {
  font-family: var(--serif);
  font-size: 1.35rem;
  line-height: 1.15;
}

/* Technique list */
.technique-list { display: flex; flex-direction: column; gap: 8px; }

.technique-card {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 14px 16px;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
  transition: border-color 0.15s;
}
.technique-card:active { border-color: var(--amber); }
.technique-card.is-recommended { border-color: var(--amber-dim); }
.technique-card.is-self-report { cursor: default; }

.technique-card-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 6px;
}
.technique-name {
  font-size: 0.9rem;
  font-weight: 600;
  color: var(--white);
}
.technique-badge {
  font-family: var(--mono);
  font-size: 0.58rem;
  letter-spacing: 0.08em;
  padding: 3px 8px;
  border-radius: 20px;
  border: 1px solid var(--border);
  color: var(--muted);
  text-transform: uppercase;
}
.technique-badge.mastered { border-color: var(--green); color: var(--green); background: rgba(46,204,135,0.08); }
.technique-badge.fluent   { border-color: var(--yellow); color: var(--yellow); background: rgba(245,200,66,0.08); }
.technique-badge.partial  { border-color: var(--amber); color: var(--amber); background: rgba(226,176,74,0.08); }

.technique-desc {
  font-size: 0.78rem;
  color: var(--muted);
  line-height: 1.4;
}

.technique-progress-row {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-top: 10px;
}
.t-progress-track {
  flex: 1;
  height: 4px;
  background: var(--steel);
  border-radius: 2px;
  overflow: hidden;
}
.t-progress-fill {
  height: 100%;
  border-radius: 2px;
  background: var(--muted);
  transition: width 0.4s ease, background 0.3s;
}
.t-progress-fill.good   { background: var(--amber); }
.t-progress-fill.great  { background: var(--green); }
.t-progress-label {
  font-family: var(--mono);
  font-size: 0.62rem;
  color: var(--muted);
  min-width: 50px;
  text-align: right;
}

/* Self-report card */
.self-report-card {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 16px;
}
.self-report-card h3 {
  font-family: var(--serif);
  font-size: 1rem;
  margin-bottom: 8px;
}
.self-report-card p {
  font-size: 0.78rem;
  color: var(--muted);
  line-height: 1.5;
  margin-bottom: 14px;
}
.self-report-card a {
  color: var(--amber);
  text-decoration: none;
}
.self-report-check {
  display: flex;
  align-items: center;
  gap: 10px;
}
.check-box {
  width: 22px;
  height: 22px;
  border: 2px solid var(--border);
  border-radius: 6px;
  background: var(--bg);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.8rem;
  color: var(--green);
  flex-shrink: 0;
  transition: border-color 0.15s;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
}
.check-box.checked { border-color: var(--green); background: rgba(46,204,135,0.1); }
.check-label { font-size: 0.8rem; color: var(--white); }

/* ════════════════════════════════
   DRILL VIEW
════════════════════════════════ */
.drill-header {
  padding: 20px 0 12px;
  display: flex;
  align-items: center;
  gap: 12px;
}
.drill-header-text {
  flex: 1;
}
.drill-header-text .d-eyebrow {
  font-family: var(--mono);
  font-size: 0.58rem;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--amber);
  margin-bottom: 2px;
}
.drill-header-text h3 {
  font-family: var(--serif);
  font-size: 1.05rem;
  line-height: 1.2;
}

/* Mastery progress strip */
.mastery-strip {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 10px 14px;
  margin-bottom: 14px;
  display: flex;
  align-items: center;
  gap: 10px;
}
.mastery-strip .ms-label {
  font-family: var(--mono);
  font-size: 0.58rem;
  color: var(--muted);
  letter-spacing: 0.08em;
  text-transform: uppercase;
  white-space: nowrap;
}
.mastery-strip .ms-track {
  flex: 1;
  height: 5px;
  background: var(--steel);
  border-radius: 3px;
  overflow: hidden;
}
.mastery-strip .ms-fill {
  height: 100%;
  border-radius: 3px;
  background: var(--amber);
  transition: width 0.3s ease, background 0.3s;
}
.mastery-strip .ms-fill.great { background: var(--green); }
.mastery-strip .ms-pct {
  font-family: var(--mono);
  font-size: 0.75rem;
  font-weight: 700;
  color: var(--amber);
  min-width: 34px;
  text-align: right;
}
.mastery-strip .ms-pct.great { color: var(--green); }

/* Concept card */
.concept-card {
  background: var(--steel);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 14px 16px;
  margin-bottom: 14px;
}
.concept-card .cc-toggle {
  display: flex;
  align-items: center;
  justify-content: space-between;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
}
.concept-card .cc-title {
  font-family: var(--mono);
  font-size: 0.62rem;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--amber);
}
.concept-card .cc-chevron {
  font-size: 0.6rem;
  color: var(--muted);
  transition: transform 0.2s;
}
.concept-card.expanded .cc-chevron { transform: rotate(180deg); }
.concept-card .cc-body {
  display: none;
  margin-top: 10px;
  font-size: 0.78rem;
  color: var(--white);
  line-height: 1.55;
}
.concept-card.expanded .cc-body { display: block; }
.concept-card .cc-example {
  margin-top: 10px;
  background: rgba(0,0,0,0.2);
  border-radius: 8px;
  padding: 10px 12px;
  font-family: var(--mono);
  font-size: 0.72rem;
  color: var(--amber);
  line-height: 1.6;
}

/* Technique cue (Chapter 7) */
.technique-cue {
  background: rgba(226,176,74,0.1);
  border: 1px solid var(--amber-dim);
  border-radius: 10px;
  padding: 10px 14px;
  margin-bottom: 12px;
  font-family: var(--mono);
  font-size: 0.68rem;
  color: var(--amber);
  letter-spacing: 0.03em;
  line-height: 1.7;
  display: none;
}
.technique-cue.visible { display: block; }
.technique-cue strong { color: var(--white); font-weight: 700; }

/* Problem card */
.problem-card {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 28px 20px 20px;
  display: flex;
  flex-direction: column;
  align-items: center;
  margin-bottom: 12px;
}
.problem-display {
  font-family: var(--mono);
  font-size: clamp(2.4rem, 11vw, 4.2rem);
  font-weight: 700;
  color: var(--white);
  text-align: center;
  line-height: 1.1;
  margin-bottom: 8px;
  letter-spacing: -0.02em;
}
.problem-display .op { color: var(--muted); }
.problem-context {
  font-size: 0.72rem;
  color: var(--muted);
  text-align: center;
  margin-bottom: 18px;
  font-style: italic;
  line-height: 1.4;
  min-height: 1.2em;
}
.answer-display {
  width: 100%;
  background: var(--bg);
  border: 2px solid var(--border);
  border-radius: 10px;
  padding: 12px;
  font-family: var(--mono);
  font-size: 1.6rem;
  text-align: center;
  color: var(--white);
  min-height: 54px;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: border-color 0.15s, background 0.15s;
  margin-bottom: 8px;
}
.answer-display.empty { color: var(--muted); font-size: 1rem; letter-spacing: 0.05em; }
.answer-display.active { border-color: var(--amber); }
.answer-display.correct { border-color: var(--green); background: rgba(46,204,135,0.08); color: var(--green); }
.answer-display.wrong   { border-color: var(--coral); background: rgba(232,74,95,0.08); color: var(--coral); }
.answer-display.close   { border-color: var(--yellow); background: rgba(245,200,66,0.08); color: var(--yellow); }

.feedback-row {
  font-family: var(--mono);
  font-size: 0.78rem;
  min-height: 1.2em;
  text-align: center;
  letter-spacing: 0.03em;
}
.feedback-row.correct { color: var(--green); }
.feedback-row.wrong   { color: var(--coral); }
.feedback-row.close   { color: var(--yellow); }
.feedback-row.hidden  { opacity: 0; }

/* Numpad */
.numpad {
  width: 100%;
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
  margin-bottom: 12px;
}
.np-btn {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 12px;
  height: 58px;
  font-family: var(--mono);
  font-size: 1.35rem;
  font-weight: 700;
  color: var(--white);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
  user-select: none;
  transition: background 0.08s, transform 0.07s;
}
.np-btn:active { background: var(--border); transform: scale(0.94); }
.np-btn.del {
  font-size: 0.85rem;
  font-family: var(--sans);
  font-weight: 600;
  color: var(--muted);
  background: var(--bg);
  letter-spacing: 0.04em;
}
.np-btn.submit {
  background: var(--amber);
  color: var(--bg);
  border-color: var(--amber);
  font-size: 1.1rem;
}
.np-btn.submit:active { background: #c49a3a; }
.np-btn.neg {
  font-size: 1rem;
  color: var(--muted);
  background: var(--bg);
}

/* Skip / hint row */
.drill-actions {
  display: flex;
  gap: 8px;
  margin-bottom: 8px;
}
.ghost-btn {
  flex: 1;
  background: transparent;
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 10px;
  font-family: var(--sans);
  font-size: 0.72rem;
  color: var(--muted);
  cursor: pointer;
  letter-spacing: 0.04em;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
}
.ghost-btn:active { color: var(--white); border-color: var(--muted); }

/* Session stats */
.session-stats {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
}
.s-stat {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 10px 6px;
  text-align: center;
}
.s-stat-val {
  font-family: var(--mono);
  font-size: 1.2rem;
  font-weight: 700;
  line-height: 1;
}
.s-stat-val.amber { color: var(--amber); }
.s-stat-val.green { color: var(--green); }
.s-stat-label {
  font-size: 0.58rem;
  color: var(--muted);
  letter-spacing: 0.08em;
  text-transform: uppercase;
  margin-top: 3px;
}

/* ── Mastery toast ── */
.mastery-toast {
  position: fixed;
  bottom: 32px;
  left: 50%;
  transform: translateX(-50%) translateY(80px);
  background: var(--green);
  color: var(--bg);
  font-family: var(--mono);
  font-size: 0.8rem;
  font-weight: 700;
  letter-spacing: 0.06em;
  padding: 12px 24px;
  border-radius: 100px;
  white-space: nowrap;
  z-index: 300;
  transition: transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
  pointer-events: none;
}
.mastery-toast.show { transform: translateX(-50%) translateY(0); }


/* ── Scenario layout (Ch6 estimation) ── */
.problem-card.scenario {
  padding: 20px 18px 18px;
  align-items: stretch;
}
.scenario-label {
  font-family: var(--mono);
  font-size: 0.58rem;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--amber);
  margin-bottom: 10px;
  text-align: center;
}
.scenario-numbers {
  display: flex;
  flex-direction: column;
  gap: 6px;
  margin-bottom: 14px;
  width: 100%;
}
.scenario-num-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: var(--bg);
  border-radius: 8px;
  padding: 9px 14px;
}
.scenario-num-row .sn-label {
  font-family: var(--sans);
  font-size: 0.7rem;
  color: var(--muted);
}
.scenario-num-row .sn-value {
  font-family: var(--mono);
  font-size: 1.05rem;
  font-weight: 700;
  color: var(--white);
  letter-spacing: -0.01em;
}
.scenario-num-row .sn-op {
  font-family: var(--mono);
  font-size: 0.9rem;
  color: var(--muted);
  min-width: 20px;
  text-align: center;
}
.scenario-prompt {
  font-family: var(--serif);
  font-size: 1rem;
  color: var(--white);
  text-align: center;
  line-height: 1.3;
  margin-bottom: 6px;
}
.scenario-tolerance {
  font-size: 0.68rem;
  color: var(--muted);
  text-align: center;
  margin-bottom: 14px;
  font-style: italic;
}

/* ── Chain layout (Ch7 multi-step) ── */
.problem-card.chain {
  padding: 18px 18px 18px;
  align-items: stretch;
  gap: 0;
}
.chain-scenario {
  font-family: var(--sans);
  font-size: 0.88rem;
  color: var(--white);
  line-height: 1.5;
  margin-bottom: 12px;
  padding: 12px 14px;
  background: var(--bg);
  border-radius: 10px;
}
.chain-steps {
  display: flex;
  flex-direction: column;
  gap: 6px;
  margin-bottom: 14px;
}
.chain-step {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 12px;
  border-radius: 8px;
  border: 1px solid var(--border);
}
.chain-step .cs-num {
  font-family: var(--mono);

// LOCALSTORAGE
// ══════════════════════════════════════════════
const STORAGE_KEY = 'mmcompanion_v1';

function loadProgress() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) return JSON.parse(raw);
  } catch(e) {}
  return {};
}

function saveProgress() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(progress));
  } catch(e) {}
}

// progress[techniqueId] = { history: [1,0,1,...], attempts: N, selfComplete: bool }
let progress = loadProgress();

function getTechniqueProgress(id) {
  if (!progress[id]) progress[id] = { history: [], attempts: 0, selfComplete: false };
  return progress[id];
}

function recordAttempt(id, correct) {
  const p = getTechniqueProgress(id);
  p.history.push(correct ? 1 : 0);
  if (p.history.length > 20) p.history.shift();
  p.attempts++;
  saveProgress();
}

function getAccuracy(id) {
  const p = getTechniqueProgress(id);
  if (!p.history || p.history.length === 0) return null;
  return p.history.reduce((s,v) => s+v, 0) / p.history.length;
}

function isMastered(id) {
  const t = getTechById(id);
  // times-table uses standard accuracy mastery
  const acc = getAccuracy(id);
  const p = getTechniqueProgress(id);
  return acc !== null && acc >= 0.85 && p.history.length >= 10;
}

function masteryLevel(id) {
  // returns: 'none' | 'partial' | 'fluent' | 'mastered'
  const t = getTechById(id);
  // times-table uses standard mastery levels
  const acc = getAccuracy(id);
  const p = getTechniqueProgress(id);
  if (acc === null || p.history.length < 5) return p.attempts > 0 ? 'partial' : 'none';
  if (acc >= 0.85 && p.history.length >= 10) return 'mastered';
  if (acc >= 0.70) return 'fluent';
  return 'partial';
}

function getTechById(id) {
  for (const ch of CURRICULUM) {
    for (const t of ch.techniques) {
      if (t.id === id) return t;
    }
  }
  return null;
}

function getChapterProgress(ch) {
  const total = ch.techniques.length;
  const mastered = ch.techniques.filter(t => isMastered(t.id)).length;
  return { total, mastered, pct: total > 0 ? mastered/total : 0 };
}

function getOverallProgress() {
  let total = 0, mastered = 0;
  for (const ch of CURRICULUM) {
    total += ch.techniques.length;
    mastered += ch.techniques.filter(t => isMastered(t.id)).length;
  }
  return total > 0 ? mastered/total : 0;
}

function getRecommendedTechniqueId() {
  for (const ch of CURRICULUM) {
    for (const t of ch.techniques) {
      if (!isMastered(t.id)) return t.id;
    }
  }
  return null;
}

}

function showMap() {

}

function showChapter(chId) {
  currentChapterId = chId;
  const ch = CURRICULUM.find(c => c.id === chId);
  document.getElementById('ch-eyebrow').textContent = 'Chapter ' + (CURRICULUM.indexOf(ch)+1);
  document.getElementById('ch-title').textContent = ch.title;
  renderTechniqueList(ch);
  showView('view-chapter');
}

function showDrill(techId) {
  currentTechniqueId = techId;
  const tech = getTechById(techId);
  const ch = CURRICULUM.find(c => c.techniques.some(t => t.id === techId));

  document.getElementById('d-eyebrow').textContent = ch.title;
  document.getElementById('d-title').textContent = tech.name;

  // Concept card
  const ccBody = document.getElementById('cc-body');
  ccBody.innerHTML = `<p>${tech.concept}</p><div class="cc-example">${tech.example.replace(/\n/g,'<br>')}</div>`;
  document.getElementById('concept-card').classList.remove('expanded');

  // Technique cue
  const cueEl = document.getElementById('technique-cue');
  if (tech.cue) {
    cueEl.innerHTML = tech.cue;
    cueEl.classList.add('visible');
  } else {
    cueEl.classList.remove('visible');
  }

  // all technique types proceed to drill view

  // Reset session
  sessionAnswered = 0;
  sessionCorrect = 0;
  currentEntry = '';
  answered = false;
  updateSessionStats();
  updateMasteryStrip(techId);
  nextProblem();
  showView('view-drill');
}

function renderMap() {
  const recId = getRecommendedTechniqueId();
  const overall = getOverallProgress();

  document.getElementById('overall-pct').textContent = Math.round(overall*100) + '%';

  const list = document.getElementById('chapter-list');
  list.innerHTML = '';

  CURRICULUM.forEach((ch, idx) => {
    const cp = getChapterProgress(ch);
    const isRec = ch.techniques.some(t => t.id === recId);
    const allMastered = cp.mastered === cp.total;
    const hasProgress = cp.mastered > 0;

    const card = document.createElement('div');
    card.className = 'chapter-card' +
      (allMastered ? ' mastered' : hasProgress ? ' in-progress' : '') +
      (isRec ? ' recommended' : '');
    card.onclick = () => showChapter(ch.id);

    const statusLabel = allMastered ? 'Complete' : hasProgress ? 'In Progress' : isRec ? 'Start Here' : 'Upcoming';
    const statusClass = allMastered ? 'done' : hasProgress ? 'active' : isRec ? 'next' : '';

    let dotsHTML = ch.techniques.map(t => {
      const lv = masteryLevel(t.id);
      const cls = lv === 'mastered' ? 'mastered' : lv === 'fluent' ? 'partial' : lv === 'partial' ? 'active' : '';
      return `<div class="t-dot ${cls}" title="${t.name}"></div>`;
    }).join('');

    card.innerHTML = `
      ${isRec ? '<div class="recommended-badge">Recommended next</div>' : ''}
      <div class="chapter-card-top">
        <span class="chapter-num">Chapter ${idx+1}</span>
        <span class="chapter-status ${statusClass}">${statusLabel}</span>
      </div>
      <div class="chapter-title">${ch.title}</div>

}

// CHAPTER VIEW RENDER
// ══════════════════════════════════════════════
function renderTechniqueList(ch) {
  const recId = getRecommendedTechniqueId();
  const list = document.getElementById('technique-list');
  list.innerHTML = '';

  ch.techniques.forEach(tech => {
    const lv = masteryLevel(tech.id);
    const isRec = tech.id === recId;

    // all techniques rendered as standard technique cards below

    const badgeLabel = lv === 'mastered' ? 'Mastered' : lv === 'fluent' ? 'Fluent' : lv === 'partial' ? 'Practicing' : '';
    const badgeClass = lv === 'mastered' ? 'mastered' : lv === 'fluent' ? 'fluent' : lv === 'partial' ? 'partial' : '';
    const acc = getAccuracy(tech.id);
    const p = getTechniqueProgress(tech.id);
    const fillPct = acc !== null ? Math.round(acc * 100) : 0;
    const fillClass = fillPct >= 85 ? 'great' : fillPct >= 70 ? 'good' : '';
    const progressLabel = acc !== null
      ? `${fillPct}% accuracy · ${p.history.length}/20 window`
      : 'Not yet started';

    const card = document.createElement('div');
    card.className = 'technique-card' + (isRec ? ' is-recommended' : '');
    card.onclick = () => showDrill(tech.id);
    const showReset = acc !== null || (p && p.attempts > 0);
    card.innerHTML = `
      ${isRec ? '<div class="recommended-badge">Recommended next</div>' : ''}
      <div class="technique-card-top">
        <span class="technique-name">${tech.name}</span>
        ${badgeLabel ? `<span class="technique-badge ${badgeClass}">${badgeLabel}</span>` : ''}
      </div>
      <div class="technique-desc">${tech.desc}</div>
      <div class="technique-progress-row">
        <div class="t-progress-track">
          <div class="t-progress-fill ${fillClass}" style="width:${fillPct}%"></div>
        </div>
        <span class="t-progress-label">${progressLabel}</span>
      </div>
      ${showReset ? `<button class="technique-reset" onclick="resetTechnique(event, '${tech.id}')">Reset progress</button>` : ''}
    `;
    list.appendChild(card);
  });
}

function resetTechnique(e, techId) {
  e.stopPropagation();
  // Show inline confirm buttons on the reset link itself
  const btn = e.target;
  if (btn.dataset.confirming === 'true') return;
  btn.dataset.confirming = 'true';
  btn.textContent = 'Confirm reset?';
  btn.style.color = 'var(--coral)';

  // Add a cancel option next to it
  const cancel = document.createElement('button');
  cancel.className = 'technique-reset';
  cancel.textContent = 'Cancel';
  cancel.style.marginLeft = '10px';
  cancel.style.color = 'var(--muted)';
  cancel.style.textDecoration = 'none';
  cancel.onclick = (ev) => {
    ev.stopPropagation();
    const ch = CURRICULUM.find(c => c.techniques.some(t => t.id === techId));
    renderTechniqueList(ch);
  };
  btn.insertAdjacentElement('afterend', cancel);

  // Swap reset button to actual reset on second tap
  btn.onclick = (ev) => {
    ev.stopPropagation();
    progress[techId] = { history: [], attempts: 0, selfComplete: false };
    saveProgress();
    const ch = CURRICULUM.find(c => c.techniques.some(t => t.id === techId));
    renderTechniqueList(ch);
  };
}

function toggleSelfReport(techId) {
  const p = getTechniqueProgress(techId);
  p.selfComplete = !p.selfComplete;
  saveProgress();
  const ch = CURRICULUM.find(c => c.techniques.some(t => t.id === techId));
  renderTechniqueList(ch);
}

let currentProblem = null; // { display, context, answer, tolerance, cue }

function nextProblem() {
  const tech = getTechById(currentTechniqueId);
  currentProblem = generateProblem(tech);
  renderProblem(currentProblem);
  currentEntry = '';
  answered = false;
  renderEntry();
  setFeedback('', '');

function generateProblem(tech) {
  switch(tech.type) {
    case 'times-table':    return genTimesTable();
    case 'bonds10':        return genBonds10();
    case 'bonds100':       return genBonds100();
    case 'ltr-add':        return genLtrAdd();
    case 'compensation-add': return genCompensationAdd();
    case 'bridging':       return genBridging();
    case 'pct-build':      return genPctBuild();
    case 'pct-complement': return genPctComplement();
    case 'pct-reverse':    return genPctReverse();
    case 'distributive':   return genDistributive();
    case 'doubling-halving': return genDoublingHalving();
    case 'div-reverse':    return genDivReverse();
    case 'div-decomp':     return genDivDecomp();
    case 'rule72':         return genRule72();
    case 'estimation-leading': return genEstimationLeading(tech);
    case 'estimation-anchor':  return genEstimationAnchor(tech);
    case 'chain-pct-mul':  return genChainPctMul();
    case 'chain-div-pct':  return genChainDivPct();
    default: return { display: '?', context: '', answer: 0, tolerance: null };
  }
}

function rnd(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }
function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }
function fmtMoney(n) { return '$' + n.toLocaleString(); }

// ── Bonds to 10 ──
function genBonds10() {
  const a = rnd(1, 9);
  return { display: `${a} + <span class="op">?</span> = 10`, context: '', answer: 10 - a, tolerance: null };
}

// ── Bonds to 100 ──
function genBonds100() {
  const a = rnd(11, 98);
  if (a % 10 === 0) return genBonds100();
  const context = `What completes ${a} to reach 100?`;
  return { display: `${a} + ? = 100`, context, answer: 100 - a, tolerance: null };
}

// ── Left-to-right addition ──
function genLtrAdd() {
  const bases = [100, 200, 300, 400, 500, 600];
  const base = pick(bases);
  const a = base + rnd(10, 99);
  const b = rnd(100, 499);
  const contexts = [
    `Two account balances combined.`,
    `Year-end contributions added together.`,
    `Portfolio segments totalled.`,
  ];
  return { display: `${a.toLocaleString()} + ${b.toLocaleString()}`, context: pick(contexts), answer: a + b, tolerance: null };
}

// ── Compensation addition ──
function genCompensationAdd() {
  // Ensure one number is within 1–5 of a round multiple of 10
  const roundBase = pick([20,30,40,50,60,70,80,90,100,200,300,400,500,600,700,800,900,1000]);
  const offset = rnd(1, 5);
  const b = roundBase - offset; // e.g. 38 (close to 40)
  const a = rnd(20, 900);
  const contexts = ['Annual fee adjustment.', 'Contribution added to balance.', 'Account top-up calculation.'];
  return { display: `${a.toLocaleString()} + ${b.toLocaleString()}`, context: pick(contexts) + ` (${b} is close to ${roundBase})`, answer: a + b, tolerance: null };
}

// ── Bridging ──
function genBridging() {
  // First number is just below a multiple of 10
  const nextTen = pick([30,40,50,60,70,80,90,100,200,300]);
  const a = nextTen - rnd(1, 5);
  const b = rnd(10, 60);
  return { display: `${a} + ${b}`, context: `Bridge through ${nextTen} first.`, answer: a + b, tolerance: null };
}


// ── AUM figure generator — clean below 70% acc, semi-round above ──
function genAmt(techId, cleanList) {
  const acc = getAccuracy(techId);
  if (acc !== null && acc >= 0.70) {
    // Semi-round: round base + messy offset
    const bases = [200000, 300000, 400000, 500000, 600000, 700000, 800000, 900000, 1000000, 1200000, 1500000];
    const base = pick(bases);
    const offsets = [23000, 37000, 47000, 53000, 63000, 72000, 84000, 91000, 17000, 44000, 58000, 67000, 76000, 83000];
    return base + pick(offsets);
  }
  return pick(cleanList);
}

// ── Build from 10% ──
function genPctBuild() {
  const cleanAmts = [120000, 240000, 360000, 480000, 560000, 640000, 800000, 960000, 1200000, 1400000, 1600000, 2000000];
  const pcts = [
    { pct: 5,  label: '5%',  fn: v => v * 0.05 },
    { pct: 15, label: '15%', fn: v => v * 0.15 },
    { pct: 20, label: '20%', fn: v => v * 0.20 },
    { pct: 25, label: '25%', fn: v => v * 0.25 },
    { pct: 30, label: '30%', fn: v => v * 0.30 },
  ];
  const feeRates = [
    { pct: 0.5,  label: '0.50%', fn: v => v * 0.005 },
    { pct: 0.75, label: '0.75%', fn: v => v * 0.0075 },
    { pct: 1.0,  label: '1.00%', fn: v => v * 0.01 },
    { pct: 1.25, label: '1.25%', fn: v => v * 0.0125 },

}

// ── Complement method ──
function genPctComplement() {

// ── Distributive multiplication ──
function genDistributive() {
  const configs = [
    { a: rnd(13,19), b: rnd(6,9) },
    { a: rnd(21,39), b: rnd(4,8) },

// ── Doubling & Halving ──
function genDoublingHalving() {
  const pairs = [
    { a: 35, b: 16 }, { a: 25, b: 48 }, { a: 15, b: 24 },
    { a: 125, b: 16 }, { a: 375, b: 24 }, { a: 75, b: 12 },

// ── Division as reverse multiplication ──
function genDivReverse() {
  const tables = [
    [6,7],[6,8],[7,8],[7,9],[8,9],[6,12],[7,12],[8,12],
    [4,9],[5,8],[5,9],[6,9],[4,7],[3,8],[3,9],[4,8],
  ];
  const [a, b] = pick(tables);
  const dividend = a * b;
  return {
    display: `${dividend} ÷ ${b}`,
    context: `Reframe: ${b} × ? = ${dividend}`,

  };
}

// ── Division by decomposition ──
function genDivDecomp() {
  const configs = [
    { divisor: 8,  quotient: rnd(30,60) },
    { divisor: 7,  quotient: rnd(30,60) },
    { divisor: 12, quotient: rnd(10,30) },
    { divisor: 9,  quotient: rnd(20,50) },
    { divisor: 6,  quotient: rnd(30,60) },
  ];
  const cfg = pick(configs);
  const dividend = cfg.divisor * cfg.quotient;
  const contexts = [
    `Annual total split into ${cfg.divisor} equal parts.`,
    `${fmtMoney(dividend)} distributed equally ${cfg.divisor} ways.`,
    `Divide ${dividend.toLocaleString()} by ${cfg.divisor}.`,
  ];
  return { display: `${dividend.toLocaleString()} ÷ ${cfg.divisor}`, context: pick(contexts), answer: cfg.quotient, tolerance: null };
}


// ── Times table drill (weighted toward hard-core facts) ──
function genTimesTable() {
  // Hard-core facts get 3x weight, others get 1x
  const hardCore = [
    [6,7],[7,6],[6,8],[8,6],[7,8],[8,7],
    [7,9],[9,7],[8,9],[9,8],[6,12],[12,6],
    [7,12],[12,7],[8,12],[12,8]
  ];
  const all = [];
  for (let a = 2; a <= 12; a++) {
    for (let b = 2; b <= 12; b++) {
      const isHard = hardCore.some(([x,y]) => x===a && y===b);
      const weight = isHard ? 3 : 1;
      for (let w = 0; w < weight; w++) all.push([a, b]);
    }
  }
  const [a, b] = pick(all);
  return {
    display: `${a} <span class="op">×</span> ${b}`,
    context: '',
    answer: a * b,
    tolerance: null
  };
}

// ── Rule of 72 ──
function genRule72() {
  const mode = Math.random() < 0.5 ? 'rate' : 'years';
  if (mode === 'rate') {
    const rates = [4, 5, 6, 7, 8, 9, 10, 12];
    const rate = pick(rates);
    const exact = (72 / rate);
    return {
      display: `72 ÷ ${rate}%`,
      context: `How many years to double at ${rate}% return?`,
      answer: parseFloat(exact.toFixed(1)),
      tolerance: 0.15, // 15% tolerance for Rule of 72 approximation
    };
  } else {
    const years = [6, 8, 9, 10, 12, 18];
    const yr = pick(years);
    const exact = 72 / yr;
    return {
      display: `72 ÷ ${yr} years`,
      context: `What annual rate is needed to double in ${yr} years?`,
      answer: parseFloat(exact.toFixed(1)),
      tolerance: 0.15,
      isPercent: true
    };
  }
}

// ── Leading digit estimation ──
function genEstimationLeading(tech) {
  const a = rnd(10, 99) * 1000 + rnd(0,999);
  const b = rnd(10, 99) * 1000 + rnd(0,999);
  const c = rnd(10, 99) * 1000 + rnd(0,999);
  const exact = a + b + c;
  return {
    layout: 'scenario',
    numbers: [
      { label: 'Account A', value: fmtMoney(a), op: '+' },
      { label: 'Account B', value: fmtMoney(b), op: '+' },
      { label: 'Account C', value: fmtMoney(c), op: '=' },
    ],
    prompt: 'Estimate the total portfolio value',
    display: `${fmtMoney(a)} + ${fmtMoney(b)} + ${fmtMoney(c)}`,
    context: `Estimate to nearest $10,000. Within 10% accepted.`,
    answer: exact,
    tolerance: tech.estimationTolerance,
  };
}

// ── Anchor and adjust estimation ──
function genEstimationAnchor(tech) {
  const anchors = [
    { principal: 85000, rate: 7, years: 10, exact: Math.round(85000 * Math.pow(1.07,10)) },
    { principal: 120000, rate: 6, years: 12, exact: Math.round(120000 * Math.pow(1.06,12)) },
    { principal: 60000, rate: 8, years: 9, exact: Math.round(60000 * Math.pow(1.08,9)) },
    { principal: 200000, rate: 7, years: 10, exact: Math.round(200000 * Math.pow(1.07,10)) },
    { principal: 150000, rate: 9, years: 8, exact: Math.round(150000 * Math.pow(1.09,8)) },
  ];
  const cfg = pick(anchors);
  return {
    layout: 'scenario',
    numbers: [
      { label: 'Principal', value: fmtMoney(cfg.principal), op: null },
      { label: 'Annual Return', value: cfg.rate + '%', op: null },
      { label: 'Time Horizon', value: cfg.years + ' years', op: null },
    ],
    prompt: 'Estimate the future value',
    display: `${fmtMoney(cfg.principal)} @ ${cfg.rate}% for ${cfg.years}yr`,
    context: `Use Rule of 72 as anchor. Within 15% accepted.`,
    answer: cfg.exact,
    tolerance: tech.estimationTolerance,
  };
}

// ── Chain: % then × ──
function genChainPctMul() {
  const scenarios = [
    { total: 640000, pct: 20, rate: 4.5 },
    { total: 800000, pct: 15, rate: 3.5 },
    { total: 1200000, pct: 25, rate: 5.0 },
    { total: 500000, pct: 30, rate: 4.0 },
    { total: 960000, pct: 20, rate: 3.0 },
  ];
  const s = pick(scenarios);
  const shifted = Math.round(s.total * s.pct / 100);
  const income = Math.round(shifted * s.rate / 100);
  return {
    layout: 'chain',
    scenario: `A client wants to move ${s.pct}% of their ${fmtMoney(s.total)} portfolio into fixed income earning ${s.rate}% annually.`,
    steps: [
      { text: `Find ${s.pct}% of ${fmtMoney(s.total)} — the amount being moved`, active: true },
      { text: `Find ${s.rate}% of that amount — annual income generated`, active: false },
    ],
    anchorLabel: fmtMoney(shifted),
    question: `What is the annual income from the new fixed income position?`,
    display: `${s.pct}% of ${fmtMoney(s.total)}, then × ${s.rate}%`,
    context: `Move ${s.pct}% to fixed income at ${s.rate}%. Annual income from that portion?`,
    answer: income,
    tolerance: null
  };
}

// ── Chain: ÷ then % ──
function genChainDivPct() {
  const scenarios = [
    { total: 840000, parts: 3, rate: 0.75 },
    { total: 600000, parts: 4, rate: 1.00 },
    { total: 1200000, parts: 3, rate: 0.50 },
    { total: 480000, parts: 4, rate: 0.75 },
    { total: 900000, parts: 3, rate: 1.25 },
  ];
  const s = pick(scenarios);
  const perAccount = Math.round(s.total / s.parts);
  const fee = Math.round(perAccount * s.rate / 100);
  return {
    layout: 'chain',
    scenario: `A client has ${fmtMoney(s.total)} split equally across ${s.parts} accounts. The advisory fee is ${s.rate}%.`,
    steps: [
      { text: `Divide ${fmtMoney(s.total)} by ${s.parts} — value per account`, active: true },
      { text: `Find ${s.rate}% of that amount — annual fee per account`, active: false },
    ],
    anchorLabel: fmtMoney(perAccount),
    question: `What is the annual advisory fee per account?`,
    display: `${fmtMoney(s.total)} ÷ ${s.parts}, then × ${s.rate}%`,
    context: `Split ${fmtMoney(s.total)} equally ${s.parts} ways. ${s.rate}% fee per account. Fee per account?`,
    answer: fee,
    tolerance: null
  };
}

// DRILL ENGINE
// ══════════════════════════════════════════════
let currentEntry = '';
let answered = false;
let sessionAnswered = 0;
let sessionCorrect = 0;
let questionStartTime = 0;

function renderProblem(prob) {
  const card = document.querySelector('.problem-card');
  const display = document.getElementById('problem-display');
  const context = document.getElementById('problem-context');

  // Reset card classes
  card.className = 'problem-card';

  if (prob.layout === 'scenario') {
    card.classList.add('scenario');
    // Build scenario layout
    let html = `<div class="scenario-label">Estimate</div>`;
    html += `<div class="scenario-numbers">`;
    prob.numbers.forEach((row, i) => {
      html += `<div class="scenario-num-row">
        <span class="sn-label">${row.label}</span>
        ${row.op ? `<span class="sn-op">${row.op}</span>` : ''}
        <span class="sn-value">${row.value}</span>
      </div>`;
    });
    html += `</div>`;
    html += `<div class="scenario-prompt">${prob.prompt}</div>`;
    html += `<div class="scenario-tolerance">${prob.context}</div>`;
    display.innerHTML = html;
    display.style.fontSize = '';
    context.textContent = '';

  } else if (prob.layout === 'chain') {
    card.classList.add('chain');
    // Build chain layout with anchor connector embedded between steps
    let html = `<div class="chain-scenario">${prob.scenario}</div>`;
    html += `<div class="chain-steps">`;
    prob.steps.forEach((step, i) => {
      html += `<div class="chain-step ${step.active ? 'active-step' : ''}">
        <span class="cs-num">${i+1}</span>
        <span class="cs-text">${step.text}</span>
      </div>`;
      // Insert anchor connector between step 1 and step 2 — hidden until answer submitted
      if (i === 0 && prob.anchorLabel) {
        html += `<div class="chain-anchor" id="chain-anchor-reveal" style="display:none">
          <span class="ca-arrow">↓</span>
          <span class="ca-value">${prob.anchorLabel}</span>
          <span class="ca-label">Step 1 result — anchor</span>
        </div>`;
      }
    });
    html += `</div>`;
    html += `<div class="chain-question">${prob.question}</div>`;
    display.innerHTML = html;
    display.style.fontSize = '';
    context.textContent = '';

  } else {
    // Standard arithmetic display
    display.style.fontSize = '';
    display.innerHTML = prob.display;
    context.textContent = prob.context || '';
  }

  questionStartTime = Date.now();
}

function renderEntry() {
  const el = document.getElementById('answer-display');
  if (currentEntry === '') {
    el.textContent = 'enter answer';
    el.className = 'answer-display empty active';
  } else {
    el.textContent = currentEntry;
    el.className = 'answer-display active';
  }
}

function np(digit) {
  if (answered) return;
  if (currentEntry.length >= 8) return;
  if (digit === '.' && currentEntry.includes('.')) return;
  currentEntry += digit;
  renderEntry();
}
function npDel() {
  if (answered) return;
  currentEntry = currentEntry.slice(0, -1);
  renderEntry();
}
function toggleDecimal() {
  if (answered) return;
  if (!currentEntry.includes('.')) { currentEntry += '.'; renderEntry(); }
}

// Technique-aware speed thresholds (ms)
const SPEED_THRESHOLDS = {
  'bonds10': 3000, 'bonds100': 4000,
  'ltr-add': 6000, 'compensation-add': 6000, 'bridging': 6000,
  'pct-build': 9000, 'pct-complement': 9000, 'pct-reverse': 9000,
  'times-table': 3000, 'distributive': 7000, 'doubling-halving': 8000,
  'div-reverse': 3000, 'div-decomp': 7000, 'rule72': 5000,
  'estimation-leading': 12000, 'estimation-anchor': 15000,
  'chain-pct-mul': 18000, 'chain-div-pct': 18000,
};

function submitAnswer() {
  if (answered) { nextProblem(); return; }
  if (currentEntry === '' || currentEntry === '.') return;

  const userVal = parseFloat(currentEntry);
  const exact = currentProblem.answer;
  const tolerance = currentProblem.tolerance;

  let isCorrect = false;
  let isClose = false;

  if (tolerance !== null) {
    const pct = Math.abs(userVal - exact) / Math.abs(exact);
    isCorrect = pct <= tolerance;
    isClose = pct <= tolerance * 1.5 && !isCorrect;
  } else {
    isCorrect = Math.abs(userVal - exact) < 0.05;
    isClose = Math.abs(userVal - exact) <= 1 && !isCorrect;
  }

  answered = true;
  sessionAnswered++;
  // Reveal chain anchor if present
  const anchorEl = document.getElementById('chain-anchor-reveal');
  if (anchorEl) anchorEl.style.display = 'flex';

  const display = document.getElementById('answer-display');
  const suffix = currentProblem.isPercent ? '%' : '';

  // Speed check
  const elapsed = Date.now() - questionStartTime;
  const threshold = SPEED_THRESHOLDS[currentTechniqueId] || 8000;
  const isSlow = elapsed > threshold;

  if (isCorrect) {
    sessionCorrect++;
    display.className = 'answer-display correct';
    setFeedback(`✓ Correct — ${exact.toLocaleString()}${suffix}`, 'correct');
    if (isSlow) showSpeedSignal();
    recordAttempt(currentTechniqueId, true);
  } else if (isClose) {
    display.className = 'answer-display close';
    setFeedback(`Close — exact answer: ${exact.toLocaleString()}${suffix}`, 'close');
    recordAttempt(currentTechniqueId, false);
  } else {
    display.className = 'answer-display wrong';
    // Chain problems: show two-step breakdown
    if (currentProblem.layout === 'chain' && currentProblem.anchorLabel) {
      setFeedback(`Step 1: ${currentProblem.anchorLabel}  →  Step 2: ${exact.toLocaleString()}${suffix}`, 'wrong');
    } else {
      setFeedback(`Answer: ${exact.toLocaleString()}${suffix}`, 'wrong');
    }
    recordAttempt(currentTechniqueId, false);
  }

  updateSessionStats();
  updateMasteryStrip(currentTechniqueId);
  checkMasteryAchieved();
  setTimeout(nextProblem, isCorrect ? 900 : 1800);
}

function skipProblem() {
  // Skip entirely — no attempt recorded, no counter incremented
  nextProblem();
}

function setFeedback(msg, cls) {
  const el = document.getElementById('feedback-row');
  el.textContent = msg;
  el.className = 'feedback-row ' + (msg ? cls : 'hidden');
}

function showSpeedSignal() {
  const el = document.getElementById('speed-signal');
  if (!el) return;
  el.textContent = '⚡ Correct — push for speed';
  el.classList.add('visible');
}

function clearSpeedSignal() {
  const el = document.getElementById('speed-signal');
  if (!el) return;
  el.textContent = '';
  el.classList.remove('visible');
}

function updateSessionStats() {
  document.getElementById('ss-answered').textContent = sessionAnswered;
  document.getElementById('ss-correct').textContent = sessionCorrect;
  const acc = sessionAnswered > 0 ? Math.round((sessionCorrect / sessionAnswered) * 100) + '%' : '—';
  document.getElementById('ss-acc').textContent = acc;
}

function updateMasteryStrip(techId) {
  const acc = getAccuracy(techId);
  const p = getTechniqueProgress(techId);
  const pct = acc !== null ? Math.round(acc * 100) : 0;
  const fill = document.getElementById('ms-fill');
  const label = document.getElementById('ms-pct');
  fill.style.width = pct + '%';
  const isGreat = pct >= 85 && p.history.length >= 10;
  fill.className = 'ms-fill' + (isGreat ? ' great' : '');
  label.className = 'ms-pct' + (isGreat ? ' great' : '');
  const windowSize = p.history.length;
  label.textContent = acc !== null ? `${pct}% (${windowSize}/20)` : '—';
}

let masteryJustAchieved = false;
function checkMasteryAchieved() {
  if (masteryJustAchieved) return;
  if (isMastered(currentTechniqueId)) {
    masteryJustAchieved = true;
    showMasteryToast();
  }
}

function showMasteryToast() {
  const toast = document.getElementById('mastery-toast');
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 2800);
}

// ══════════════════════════════════════════════
// CONCEPT CARD
// ══════════════════════════════════════════════
function toggleConcept() {
  document.getElementById('concept-card').classList.toggle('expanded');
}

// ══════════════════════════════════════════════
// KEYBOARD SUPPORT (DESKTOP)
// ══════════════════════════════════════════════
document.addEventListener('keydown', e => {
  const drill = document.getElementById('view-drill');
  if (!drill.classList.contains('active')) return;
  if (answered) return;
  if (e.key >= '0' && e.key <= '9') np(e.key);
  else if (e.key === '.') { if (!currentEntry.includes('.')) np('.'); }
  else if (e.key === 'Backspace') npDel();
  else if (e.key === 'Enter') submitAnswer();
});

// ══════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════
showMap();
</script>
